<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Eastern Townships</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bar-h: calc(48px + env(safe-area-inset-top, 0px));
      --filter-h: 48px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      background: #e8ede5;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--bar-h);
      padding-top: env(safe-area-inset-top, 0px);
      background: white;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: stretch;
      z-index: 3000;
    }

    .app-title {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 700;
      color: #1a5e3b;
      gap: 6px;
    }

    .tab-btn {
      padding: 0 18px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active { color: #1a5e3b; border-bottom-color: #1a5e3b; }

    /* ── Views ── */
    .view {
      position: fixed;
      top: var(--bar-h);
      left: 0; right: 0; bottom: 0;
      display: none;
    }
    .view.active { display: block; }

    /* ── Filter bar ── */
    .filter-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--filter-h);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      overflow-x: auto;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: white;
      font-size: 12.5px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-chip.active { color: white; border-color: transparent; }

    /* ── Map ── */
    #map {
      position: absolute;
      top: var(--filter-h);
      left: 0; right: 0; bottom: 0;
    }

    /* ── Locate button ── */
    .locate-btn {
      position: absolute;
      bottom: calc(16px + var(--safe-bottom));
      right: 12px;
      z-index: 1000;
      width: 40px; height: 40px;
      border-radius: 8px;
      border: none;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Leaflet zoom control ── */
    .leaflet-bottom.leaflet-right {
      bottom: calc(64px + var(--safe-bottom));
      right: 12px;
    }
    .leaflet-control-zoom a {
      font-size: 18px !important;
      line-height: 30px !important;
    }

    /* ── Custom marker ── */
    .cat-marker {
      border-radius: 50%;
      display: flex !important;
      align-items: center;
      justify-content: center;
      border: 2.5px solid white;
      box-shadow: 0 2px 7px rgba(0,0,0,0.35);
      cursor: pointer;
      font-size: 13px;
      width: 30px !important;
      height: 30px !important;
    }

    /* ── Bottom sheet overlay ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      z-index: 4000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sheet-overlay.visible { opacity: 1; pointer-events: auto; }

    /* ── Bottom sheet ── */
    .bottom-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 62vh;
      background: white;
      border-radius: 18px 18px 0 0;
      z-index: 5000;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.14);
      padding-bottom: var(--safe-bottom);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex;
      align-items: flex-start;
      padding: 10px 16px 8px;
      gap: 10px;
      flex-shrink: 0;
    }

    .sheet-cat-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .sheet-title-block { flex: 1; min-width: 0; }

    .sheet-name {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }

    .sheet-meta {
      font-size: 12.5px;
      color: #6b7280;
      margin-top: 2px;
    }

    .sheet-close {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: #f3f4f6;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-body {
      padding: 2px 16px 10px;
      overflow-y: auto;
      flex: 1;
    }

    .sheet-description {
      font-size: 14px;
      line-height: 1.65;
      color: #374151;
    }

    .sheet-rating {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
    }

    .sheet-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px 12px;
      border-top: 1px solid #f3f4f6;
      flex-shrink: 0;
    }

    .sheet-btn {
      flex: 1;
      padding: 9px 8px;
      border-radius: 9px;
      border: 1.5px solid #d1d5db;
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-btn.primary {
      background: #1a5e3b;
      border-color: #1a5e3b;
      color: white;
    }

    /* ── Guide view ── */
    #guide-view {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #f9fafb;
      padding-bottom: var(--safe-bottom);
    }

    .guide-intro {
      padding: 14px 16px;
      background: #1a5e3b;
      color: white;
      font-size: 13px;
      line-height: 1.55;
    }

    .guide-section { margin-bottom: 2px; }

    .guide-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      background: white;
      border-bottom: 1px solid #f3f4f6;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .guide-section-swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .guide-section-label {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      flex: 1;
    }

    .guide-section-count {
      font-size: 12px;
      color: #9ca3af;
      font-weight: 500;
    }

    .guide-entry {
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .guide-entry-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .guide-entry-name {
      font-size: 14.5px;
      font-weight: 600;
      color: #111827;
      flex: 1;
    }

    .guide-entry-town {
      font-size: 11.5px;
      color: #6b7280;
      margin-top: 2px;
    }

    .guide-map-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid #d1d5db;
      background: white;
      font-size: 12px;
      color: #1a5e3b;
      cursor: pointer;
      font-weight: 600;
      -webkit-tap-highlight-color: transparent;
    }

    .guide-entry-desc {
      font-size: 13px;
      line-height: 1.55;
      color: #4b5563;
      margin-top: 7px;
    }

    .guide-entry-links {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .guide-link {
      font-size: 12px;
      color: #1a5e3b;
      text-decoration: none;
      font-weight: 500;
    }

    .guide-entry-rating {
      font-size: 11.5px;
      color: #9ca3af;
      margin-top: 5px;
    }

    .guide-static-section {
      background: white;
      margin-top: 2px;
    }

    .guide-static-body {
      padding: 12px 16px;
      font-size: 13.5px;
      line-height: 1.65;
      color: #374151;
    }

    .guide-static-body li {
      margin: 6px 0 6px 16px;
    }

    /* highlight flash for guide → map navigation */
    @keyframes flash-entry {
      0%, 100% { background: white; }
      30% { background: #d1fae5; }
    }
    .flash { animation: flash-entry 1.2s ease; }
  </style>
</head>
<body>

<div class="tab-bar">
  <div class="app-title">
    <span>🗺</span>
    <span>Eastern Townships</span>
  </div>
  <button class="tab-btn active" id="tab-map" onclick="showTab('map')">Map</button>
  <button class="tab-btn" id="tab-guide" onclick="showTab('guide')">Guide</button>
</div>

<div id="map-view" class="view active">
  <div class="filter-bar" id="filter-bar"></div>
  <div id="map"></div>
  <button class="locate-btn" onclick="locateUser()" title="My location">📍</button>
</div>

<div id="guide-view" class="view"></div>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-cat-dot" id="sheet-dot"></div>
    <div class="sheet-title-block">
      <div class="sheet-name" id="sheet-name"></div>
      <div class="sheet-meta" id="sheet-meta"></div>
    </div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="sheet-description" id="sheet-desc"></div>
    <div class="sheet-rating" id="sheet-rating"></div>
  </div>
  <div class="sheet-actions" id="sheet-actions"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    description:'Café-inn that roasts coffee on site in a charming setting near heritage attractions like the 12-sided Walbridge Barn and Missisquoi Museum.',
    mapsUrl:'https://www.google.com/maps/place/L\'Oeuf/@45.1540547,-72.986941,17z', rating:4, ratingLabel:'Charm' },

  { id:'c13', name:'La Shop', town:'Magog', category:'cafe', lat:45.2626744, lng:-72.1396346,

  // ── FARM-TO-TABLE ──
  { id:'ft1', name:'Les Cocagnes', town:'Frelighsburg', category:'farm-table', lat:45.0591051, lng:-72.827313,
    description:'Agro-ecological collective farm hosting a country-style table in summer (mid-June to late September). Twenty-one guest chefs prepare five-course meals under a pergola using the farm\'s organic vegetables, with wine, cider or beer pairings.',

  { id:'ft2', name:'L\'Espace Old Mill', town:'Stanbridge East', category:'farm-table', lat:45.1202462, lng:-72.9153428,
    description:'Farm, restaurant and inn overseen by market gardener Jean-Martin Fortier and Chef Éric Gendron. Michelin Green Star. Five-course tasting menu based on produce from its gardens and the Brome-Missisquoi region.',
    mapsUrl:'https://www.google.com/maps/place/Espace+Old+Mill/@45.1202462,-72.9153428,17z', rating:5, ratingLabel:'Charm' },

  { id:'ft3', name:'Ferme Au pied levé', town:'Magog', category:'farm-table', lat:45.1774988, lng:-72.14069,
    description:'Working farm raising Highland cattle, pigs, goats and geese. Six-course gourmet dinner and hearty breakfast (BYOB). Guests can stroll the grounds and meet the animals.',
    mapsUrl:'https://www.google.com/maps/place/Ferme+Au+Pied+Lev%C3%A9/@45.1774988,-72.14069,17z', rating:4, ratingLabel:'Charm' },

  { id:'ft4', name:'Les Mal-Aimés', town:'Cookshire-Eaton', category:'farm-table', lat:45.3706231, lng:-71.5990644,
    description:'Michelin-recommended. Seven- or ten-course dinners, four-course lunches and picnic baskets. Chefs Daniel Charbonneau and Yannick Côté showcase boreal ingredients and produce from their market farm Le Jardinier Déchaîné.',
    mapsUrl:'https://www.google.com/maps/place/Restaurant+Les+Mal-aim%C3%A9s/@45.3706231,-71.5990644,17z', rating:4, ratingLabel:'Charm' },

  { id:'ft5', name:'Parcelles', town:'Austin', category:'farm-table', lat:45.2038934, lng:-72.2390176,
    description:'Vegetable farm and table champêtre. Wood-oven pizzas, natural wines and garden-fresh crudités. Open Fridays to Sundays midday to sunset. Dine in the fields or inside a shelter on rainy days.',
    mapsUrl:'https://www.google.com/maps/place/Parcelles/@45.2038934,-72.2390176,17z', rating:4, ratingLabel:'Charm' },

  { id:'ft6', name:'Jardins Bolton', town:'Bolton-Est', category:'farm-table', lat:45.2119846, lng:-72.3551233,
    description:'Open-air gastronomic evenings on a hilltop with views of fields, mountains and a river. Share a large communal table while chefs cook over an open fire. Weekly-changing menu celebrating local ingredients.',
    mapsUrl:'https://www.google.com/maps/place/Les+Jardins+Bolton/@45.2119846,-72.3551233,17z', rating:5, ratingLabel:'Charm' },
];

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let activeCategories = new Set();  // empty = show all
let selectedPlaceId = null;
let locationMarker = null;
let locationCircle = null;

// ─────────────────────────────────────────
//  MAP INIT
// ─────────────────────────────────────────
const map = L.map('map', {
  center: [45.28, -72.1],
  zoom: 9,
  zoomControl: false,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ─────────────────────────────────────────
//  MARKERS & CIRCLES
// ─────────────────────────────────────────
const markerMap = {};   // id → L.Marker
const circleMap = {};   // id → L.Circle (bike loops only)

function makeIcon(cat) {
  const c = CATS[cat];
  return L.divIcon({
    className: '',
    html: `<div class="cat-marker" style="background:${c.color}">${c.emoji}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
  });
}

PLACES.forEach(p => {
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p.category) });
  marker.on('click', () => openSheet(p.id));
  marker.addTo(map);
  markerMap[p.id] = marker;

  // Bike loop area circle
  if (p.category === 'bike-loop' && p.distance) {
    const radiusM = Math.round(p.distance * 155);  // rough loop radius
    const circle = L.circle([p.lat, p.lng], {
      radius: radiusM,
      color: CATS['bike-loop'].color,
      weight: 1.5,
      dashArray: '6 4',
      fillColor: CATS['bike-loop'].color,
      fillOpacity: 0.06,
      interactive: false,
    });
    circle.addTo(map);
    circleMap[p.id] = circle;
  }
});

// ─────────────────────────────────────────
//  FILTER CHIPS
// ─────────────────────────────────────────
const filterBar = document.getElementById('filter-bar');

function buildFilters() {
  filterBar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'filter-chip' + (activeCategories.size === 0 ? ' active' : '');
  all.style.background = activeCategories.size === 0 ? '#1a5e3b' : '';
  all.textContent = 'All';
  all.onclick = () => { activeCategories.clear(); applyFilters(); };
  filterBar.appendChild(all);

  Object.entries(CATS).forEach(([key, meta]) => {
    const chip = document.createElement('button');
    const on = activeCategories.has(key);
    chip.className = 'filter-chip' + (on ? ' active' : '');
    if (on) chip.style.background = meta.color;
    chip.textContent = `${meta.emoji} ${meta.label}`;
    chip.onclick = () => {
      if (activeCategories.has(key)) activeCategories.delete(key);
      else activeCategories.add(key);
      applyFilters();
    };
    filterBar.appendChild(chip);
  });
}

function applyFilters() {
  buildFilters();
  const showAll = activeCategories.size === 0;
  PLACES.forEach(p => {
    const show = showAll || activeCategories.has(p.category);
    const m = markerMap[p.id];
    if (show) { if (!map.hasLayer(m)) map.addLayer(m); }
    else       { if (map.hasLayer(m)) map.removeLayer(m); }

    if (circleMap[p.id]) {
      const cir = circleMap[p.id];
      if (show) { if (!map.hasLayer(cir)) map.addLayer(cir); }
      else       { if (map.hasLayer(cir)) map.removeLayer(cir); }
    }
  });
  if (selectedPlaceId) {
    const sp = PLACES.find(x => x.id === selectedPlaceId);
    if (sp && !showAll && !activeCategories.has(sp.category)) closeSheet();
  }
}

buildFilters();

// ─────────────────────────────────────────
//  BOTTOM SHEET
// ─────────────────────────────────────────
function openSheet(id) {
  const p = PLACES.find(x => x.id === id);
  if (!p) return;
  selectedPlaceId = id;

  const cat = CATS[p.category];
  document.getElementById('sheet-dot').style.background = cat.color;
  document.getElementById('sheet-name').textContent = p.name;
  document.getElementById('sheet-meta').textContent =
    p.town + (p.distance ? ` · ${p.distance} km loop` : ` · ${cat.label}`);
  document.getElementById('sheet-desc').textContent = p.description;

  const ratingEl = document.getElementById('sheet-rating');
  ratingEl.textContent = p.rating ? `${p.ratingLabel} rating: ${'★'.repeat(p.rating)}${'☆'.repeat(5 - p.rating)}` : '';

  const actions = document.getElementById('sheet-actions');
  actions.innerHTML = '';

  const mapsBtn = document.createElement('a');
  mapsBtn.className = 'sheet-btn';
  mapsBtn.href = p.mapsUrl;
  mapsBtn.target = '_blank';
  mapsBtn.rel = 'noopener';
  mapsBtn.innerHTML = '🗺 Maps';
  actions.appendChild(mapsBtn);

  if (p.routeUrl) {
    const routeBtn = document.createElement('a');
    routeBtn.className = 'sheet-btn';
    routeBtn.href = p.routeUrl;
    routeBtn.target = '_blank';
    routeBtn.rel = 'noopener';
    routeBtn.innerHTML = '🚴 Route';
    actions.appendChild(routeBtn);
  }

  const guideBtn = document.createElement('button');
  guideBtn.className = 'sheet-btn primary';
  guideBtn.innerHTML = '📋 Guide';
  guideBtn.onclick = () => viewInGuide(id);
  actions.appendChild(guideBtn);

  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeSheet() {
  selectedPlaceId = null;
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function viewInGuide(id) {
  closeSheet();
  showTab('guide');
  setTimeout(() => {
    const el = document.getElementById('guide-entry-' + id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 1400);
    }
  }, 80);
}

// ─────────────────────────────────────────
//  GUIDE VIEW
// ─────────────────────────────────────────
function buildGuide() {
  const view = document.getElementById('guide-view');
  view.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'guide-intro';
  intro.textContent = 'Eastern Townships — Cantons-de-l\'Est. A comprehensive guide for a 4–5 day road trip through Quebec\'s wine country, breweries, cycling routes and charming villages south of Montréal.';
  view.appendChild(intro);

  Object.entries(CATS).forEach(([key, meta]) => {
    const places = PLACES.filter(p => p.category === key);
    if (!places.length) return;

    const section = document.createElement('div');
    section.className = 'guide-section';

    const header = document.createElement('div');
    header.className = 'guide-section-header';
    header.innerHTML = `
      <div class="guide-section-swatch" style="background:${meta.color}"></div>
      <div class="guide-section-label">${meta.emoji} ${meta.label}</div>
      <div class="guide-section-count">${places.length}</div>
    `;
    section.appendChild(header);

    places.forEach(p => {
      const entry = document.createElement('div');
      entry.className = 'guide-entry';
      entry.id = 'guide-entry-' + p.id;

      let links = `<a class="guide-link" href="${p.mapsUrl}" target="_blank" rel="noopener">Google Maps ↗</a>`;
      if (p.routeUrl) links += `<a class="guide-link" href="${p.routeUrl}" target="_blank" rel="noopener">Route page ↗</a>`;

      const ratingHtml = p.rating
        ? `<div class="guide-entry-rating">${p.ratingLabel}: ${'★'.repeat(p.rating)}${'☆'.repeat(5 - p.rating)}</div>`
        : '';

      entry.innerHTML = `
        <div class="guide-entry-top">
          <div>
            <div class="guide-entry-name">${p.name}</div>
            <div class="guide-entry-town">${p.town}${p.distance ? ' · ' + p.distance + ' km' : ''}</div>
          </div>
          <button class="guide-map-btn" onclick="goToMap('${p.id}')">View on map →</button>
        </div>
        <div class="guide-entry-desc">${p.description}</div>
        ${ratingHtml}
        <div class="guide-entry-links">${links}</div>
      `;
      section.appendChild(entry);
    });

    view.appendChild(section);
  });

  // Static sections
  const cyclingNote = document.createElement('div');
  cyclingNote.className = 'guide-static-section';
  cyclingNote.innerHTML = `
    <div class="guide-section-header" style="position:static">
      <div class="guide-section-swatch" style="background:#16A34A"></div>
      <div class="guide-section-label">🧭 Cycling Route Resources</div>
    </div>
    <div class="guide-static-body">
      Each official route page offers: <strong>Send to device with Ride with GPS</strong>, <strong>Download GPX file</strong> and <strong>Download PDF map</strong>. All loops are available on Ride with GPS with distance, elevation and a Send to Device button for cycling computers. The Brome-Missisquoi tourism board also publishes a paper map featuring about ten circuits.
    </div>
  `;
  view.appendChild(cyclingNote);

  const other = document.createElement('div');
  other.className = 'guide-static-section';
  other.innerHTML = `
    <div class="guide-section-header" style="position:static">
      <div class="guide-section-swatch" style="background:#6B7280"></div>
      <div class="guide-section-label">✨ Other Notable Experiences</div>
    </div>
    <div class="guide-static-body">
      <ul>
        <li><strong>Spa Eastman</strong> — One of the world's leading spas, in Eastman, with ponds and wooded trails.</li>
        <li><strong>Missisquoi Museum &amp; Walbridge Barn</strong> — In Stanbridge East: Cornell Mill, Hodge's General Store and the unique 12-sided barn in Mystic.</li>
        <li><strong>Heritage &amp; Literary Trails</strong> — Eastman's trail around Lake d'Argent features texts by Quebec authors; Piopolis' heritage trail has a podcast companion.</li>
        <li><strong>Frontenac National Park</strong> — Near Lambton: biking, kayaking, swimming and star-gazing along Lake Saint-François.</li>
      </ul>
    </div>
  `;
  view.appendChild(other);
}

function goToMap(id) {
  showTab('map');
  const p = PLACES.find(x => x.id === id);
  if (p) {
    map.panTo([p.lat, p.lng]);
    setTimeout(() => openSheet(id), 200);
  }
}

// ─────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────
function showTab(tab) {
  document.getElementById('map-view').classList.toggle('active', tab === 'map');
  document.getElementById('guide-view').classList.toggle('active', tab === 'guide');
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('tab-guide').classList.toggle('active', tab === 'guide');
  if (tab === 'map') {
    // Invalidate map size in case the view was hidden
    setTimeout(() => map.invalidateSize(), 50);
  }
}

// ─────────────────────────────────────────
//  GPS LOCATION
// ─────────────────────────────────────────
function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    if (locationMarker) { map.removeLayer(locationMarker); map.removeLayer(locationCircle); }
    locationCircle = L.circle([lat, lng], {
      radius: accuracy,
      color: '#3b82f6',
      weight: 1,
      fillColor: '#3b82f6',
      fillOpacity: 0.1,
      interactive: false,
    }).addTo(map);
    locationMarker = L.circleMarker([lat, lng], {
      radius: 8,
      color: 'white',
      weight: 2,
      fillColor: '#3b82f6',
      fillOpacity: 1,
    }).addTo(map);
    map.setView([lat, lng], 12);
  }, err => {
    alert('Could not get location: ' + err.message);
  });
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
buildGuide();
</script>
