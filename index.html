<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Eastern Townships</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bar-h: calc(48px + env(safe-area-inset-top, 0px));
      --filter-h: 48px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh; overflow: hidden; background: #e8ede5;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--bar-h); padding-top: env(safe-area-inset-top, 0px);
      background: white; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: stretch; z-index: 3000;
    }
    .app-title {
      flex: 1; display: flex; align-items: center;
      padding: 0 16px; font-size: 15px; font-weight: 700; color: #1a5e3b; gap: 6px;
    }
    .tab-btn {
      padding: 0 18px; border: none; background: transparent;
      font-size: 14px; font-weight: 600; color: #9ca3af; cursor: pointer;
      border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: #1a5e3b; border-bottom-color: #1a5e3b; }

    /* ── Global filter bar (sits below tab bar, above both views) ── */
    .filter-bar {
      position: fixed; top: var(--bar-h); left: 0; right: 0;
      height: var(--filter-h); z-index: 2900;
      display: flex; align-items: center; gap: 7px; padding: 0 12px;
      overflow-x: auto; background: rgba(255,255,255,0.97);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid #d1d5db; background: white;
      font-size: 12.5px; font-weight: 500; color: #374151;
      cursor: pointer; white-space: nowrap; transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-chip.active { color: white; border-color: transparent; }

    /* ── Views (below tab bar + filter bar) ── */
    .view {
      position: fixed;
      top: calc(var(--bar-h) + var(--filter-h));
      left: 0; right: 0; bottom: 0; display: none;
    }
    .view.active { display: block; }

    /* ── Map fills entire map-view ── */
    #map { position: absolute; inset: 0; }

    /* ── Map control group (locate 📍 above + and −) ── */
    .map-ctrl-group {
      position: absolute; bottom: calc(16px + var(--safe-bottom)); right: 12px;
      z-index: 1000; display: flex; flex-direction: column; gap: 1px;
    }
    .map-ctrl-btn {
      width: 34px; height: 34px; border-radius: 4px;
      border: 2px solid rgba(0,0,0,0.2); background: white;
      box-shadow: 0 1px 5px rgba(0,0,0,.35);
      cursor: pointer; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; color: #333; line-height: 1;
    }
    .map-ctrl-btn:active { background: #f0f0f0; }

    /* ── Custom marker ── */
    .cat-marker {
      border-radius: 50%; display: flex !important; align-items: center;
      justify-content: center; border: 2.5px solid white;
      box-shadow: 0 2px 7px rgba(0,0,0,.35); cursor: pointer;
      font-size: 13px; width: 30px !important; height: 30px !important;
    }


    /* ── Bottom sheet ── */
    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; max-height: 62vh;
      background: white; border-radius: 18px 18px 0 0; z-index: 5000;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
      display: flex; flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,.14); padding-bottom: var(--safe-bottom);
    }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: #d1d5db;
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
    }
    .sheet-header {
      display: flex; align-items: flex-start;
      padding: 10px 16px 8px; gap: 10px; flex-shrink: 0;
    }
    .sheet-cat-dot {
      width: 11px; height: 11px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
    }
    .sheet-title-block { flex: 1; min-width: 0; }
    .sheet-name { font-size: 17px; font-weight: 700; color: #111827; line-height: 1.3; }
    .sheet-meta { font-size: 12.5px; color: #6b7280; margin-top: 2px; }
    .sheet-close {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: #f3f4f6; cursor: pointer; font-size: 14px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-body { padding: 2px 16px 10px; overflow-y: auto; flex: 1; }
    .sheet-description { font-size: 14px; line-height: 1.65; color: #374151; }
    .sheet-rating { margin-top: 6px; font-size: 12px; color: #9ca3af; }
    .sheet-actions {
      display: flex; gap: 8px; padding: 10px 16px 12px;
      border-top: 1px solid #f3f4f6; flex-shrink: 0;
    }
    .sheet-btn {
      flex: 1; padding: 9px 8px; border-radius: 9px;
      border: 1.5px solid #d1d5db; background: white;
      font-size: 13px; font-weight: 500; color: #374151; cursor: pointer;
      text-align: center; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Guide view ── */
    #guide-view {
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: #f9fafb; padding-bottom: var(--safe-bottom);
    }
    .guide-empty {
      padding: 48px 24px; text-align: center; color: #9ca3af; font-size: 14px;
    }
    .guide-section { margin-bottom: 2px; }
    .guide-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 10px; background: white;
      border-bottom: 1px solid #f3f4f6; position: sticky; top: 0; z-index: 10;
    }
    .guide-section-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .guide-section-label { font-size: 15px; font-weight: 700; color: #111827; flex: 1; }
    .guide-section-count { font-size: 12px; color: #9ca3af; font-weight: 500; }
    .guide-entry { background: white; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    .guide-entry-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .guide-entry-name { font-size: 14.5px; font-weight: 600; color: #111827; flex: 1; }
    .guide-entry-town { font-size: 11.5px; color: #6b7280; margin-top: 2px; }
    .guide-map-btn {
      flex-shrink: 0; padding: 4px 10px; border-radius: 6px;
      border: 1.5px solid #d1d5db; background: white;
      font-size: 12px; color: #1a5e3b; cursor: pointer; font-weight: 600;
      -webkit-tap-highlight-color: transparent;
    }
    .guide-entry-desc { font-size: 13px; line-height: 1.55; color: #4b5563; margin-top: 7px; }
    .guide-entry-links { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .guide-link { font-size: 12px; color: #1a5e3b; text-decoration: none; font-weight: 500; }
    .guide-entry-rating { font-size: 11.5px; color: #9ca3af; margin-top: 5px; }
    .guide-static-section { background: white; margin-top: 2px; }
    .guide-static-body {
      padding: 12px 16px; font-size: 13.5px; line-height: 1.65; color: #374151;
    }
    .guide-static-body li { margin: 6px 0 6px 16px; }

    @keyframes flash-entry {
      0%, 100% { background: white; }
      30% { background: #d1fae5; }
    }
    .flash { animation: flash-entry 1.2s ease; }
  </style>
</head>

// ─────────────────────────────────────────
//  SCENIC DRIVE APPROXIMATE POLYLINES
//  Traced through the key towns/vineyards mentioned for each route.
// ─────────────────────────────────────────
const SCENIC_PATHS = {
  // sd1: Brome-Missisquoi Wine Route — 160 km circuit through wine country
  'sd1': [
    [45.1324, -72.8008], // Maison des vins, Dunham (start)
    [45.1096, -72.8590], // Orpailleur/Gagliano, Dunham
    [45.0814, -72.8186], // Val Caudalies
    [45.0536, -72.8387], // Frelighsburg
    [45.0377, -72.7934], // Clos Saragnat
    [45.0727, -72.9349], // Saint-Armand (Domaine du Ridge)
    [45.1191, -72.9798], // Bedford
    [45.1540, -72.9869], // Mystic
    [45.1215, -72.9157], // Stanbridge East
    [45.1991, -72.7492], // Cowansville
    [45.2347, -72.8548], // Brigham (Vignoble de la Bauge)
    [45.2848, -72.9889], // Farnham
    [45.2532, -72.7353], // Vignoble Bromont
    [45.3157, -72.6424], // Bromont
    [45.2622, -72.5887], // Léon Courville / Lac-Brome
    [45.2199, -72.5119], // Knowlton
    [45.1071, -72.6147], // Sutton
    [45.0236, -72.5833], // Château Ste-Agnès
    [45.0992, -72.7114], // Vignoble du Ruisseau
    [45.1324, -72.8008], // back to Dunham
  ],
  // sd2: Townships Trail — 430 km W→E heritage route (Granby → Lambton)
  'sd2': [
    [45.3974, -72.7161], // Granby (western end)
    [45.3334, -72.6499], // Bromont
    [45.3433, -72.5158], // Waterloo
    [45.3306, -72.3030], // Eastman
    [45.2658, -72.1583], // Magog
    [45.2755, -71.9731], // North Hatley
    [45.3955, -71.9466], // Sherbrooke
    [45.5628, -72.0191], // Windsor
    [45.6649, -72.1480], // Richmond
    [45.6834, -71.7028], // Saint-Camille
    [45.4098, -71.6345], // Cookshire-Eaton
    [45.8407, -71.0891], // Lambton (eastern extent)
  ],
  // sd3: Route des Sommets — 193 km circuit through the highest peaks
  // Counterclockwise: La Patrie → east to Lac-Mégantic → west through highlands → Windsor → back SE
  'sd3': [
    [45.4247, -71.2561], // La Patrie (start)
    [45.5750, -70.8813], // Lac-Mégantic (northeast)
    [45.4865, -70.9038], // Piopolis (south shore)
    [45.4801, -71.2107], // Scotstown highlands (west)
    [45.4990, -71.5292], // Bury (west)
    [45.4098, -71.6345], // Cookshire-Eaton
    [45.6834, -71.7028], // Saint-Camille (north)
    [45.5628, -72.0191], // Windsor (northwest)
    [45.4247, -71.2561], // back to La Patrie
  ],
};

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let activeCategories = new Set();
let selectedPlaceId = null;
let locationMarker = null;
let locationCircle = null;

// ─────────────────────────────────────────
//  MAP INIT
// ─────────────────────────────────────────
const map = L.map('map', { center: [45.28, -72.1], zoom: 9, zoomControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);
// Zoom handled by custom .map-ctrl-group buttons

// Tap-to-close: a genuine stationary tap closes the sheet; drag and pinch do not.
// We track touch movement ourselves because Leaflet's drag threshold (~3px) is
// too small on mobile — a tiny finger wobble fires 'click' after a drag attempt.
// Close the sheet when the user clicks/taps anywhere outside it.
// Using capture phase (true) so this runs before Leaflet's own handlers.
// The browser does NOT fire 'click' after a real drag (desktop or mobile),
// so this naturally ignores pans and pinch-zooms.
document.addEventListener('click', function(e) {
  if (!selectedPlaceId) return;
  const sheet = document.getElementById('bottom-sheet');
  if (sheet.contains(e.target)) return;                        // click was on the card
  if (e.target.closest && (
    e.target.closest('.cat-marker') ||                         // emoji pin
    e.target.closest('.leaflet-interactive')                   // circle, polyline, etc.
  )) return;
  closeSheet();
}, true);

// ─────────────────────────────────────────
//  MARKERS  (emoji coloured pins)
// ─────────────────────────────────────────
const markerMap = {};
const circleMap = {};

function makeIcon(cat) {
  const c = CATS[cat];
  return L.divIcon({
    className: '',
    html: `<div class="cat-marker" style="background:${c.color}">${c.emoji}</div>`,
    iconSize: [30, 30], iconAnchor: [15, 15],
  });
}

PLACES.forEach(p => {
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.category) });
  m.on('click', () => openSheet(p.id));
  m.addTo(map);
  markerMap[p.id] = m;

  // Bike loop circles: circumference ≈ loop distance (radius = dist×1000/2π)
  if (p.category === 'bike-loop' && p.distance) {
    const r = Math.round(p.distance * 1000 / (2 * Math.PI));
    const circle = L.circle([p.lat, p.lng], {
      radius: r,
      color: CATS['bike-loop'].color,
      weight: 1.5,
      dashArray: '7 5',
      fillColor: CATS['bike-loop'].color,
      fillOpacity: 0.05,
      interactive: false,
    });
    circle.addTo(map);
    circleMap[p.id] = circle;
  }
});

// ─────────────────────────────────────────
//  SCENIC DRIVE POLYLINES
// ─────────────────────────────────────────
const scenicPolylines = {};
const driveColor = CATS['scenic-drive'].color;

const DRIVE_DIM = 0.22;   // default opacity (ghost state)
const DRIVE_FULL = 1.0;   // selected route opacity
const DRIVE_FADE = 0.08;  // other routes while one is selected

Object.entries(SCENIC_PATHS).forEach(([id, coords]) => {
  const poly = L.polyline(coords, {
    color: driveColor, weight: 2.5, opacity: DRIVE_DIM, interactive: false,
  });
  poly.addTo(map);
  scenicPolylines[id] = poly;
});

function highlightDrive(activeId) {
  Object.entries(scenicPolylines).forEach(([id, poly]) => {
    if (!map.hasLayer(poly)) return;
    poly.setStyle(id === activeId
      ? { opacity: DRIVE_FULL, weight: 4 }
      : { opacity: DRIVE_FADE, weight: 2.5 });
    if (id === activeId) poly.bringToFront();
  });
}

function resetDriveStyles() {
  Object.values(scenicPolylines).forEach(poly => {
    poly.setStyle({ opacity: DRIVE_DIM, weight: 2.5 });
  });
}

// ─────────────────────────────────────────
//  FILTER CHIPS
// ─────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';

  const allChip = document.createElement('button');
  allChip.className = 'filter-chip' + (activeCategories.size === 0 ? ' active' : '');
  if (activeCategories.size === 0) allChip.style.background = '#374151';
  allChip.textContent = 'All';
  allChip.onclick = () => { activeCategories.clear(); applyFilters(); };
  bar.appendChild(allChip);

  Object.entries(CATS).forEach(([key, meta]) => {
    const on = activeCategories.has(key);
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (on ? ' active' : '');
    if (on) chip.style.background = meta.color;
    chip.textContent = `${meta.emoji} ${meta.label}`;
    chip.onclick = () => {
      if (activeCategories.has(key)) activeCategories.delete(key);
      else activeCategories.add(key);
      applyFilters();
    };
    bar.appendChild(chip);
  });
}

function applyFilters() {
  buildFilters();
  const showAll = activeCategories.size === 0;

  PLACES.forEach(p => {
    const show = showAll || activeCategories.has(p.category);
    const m = markerMap[p.id];
    show ? (!map.hasLayer(m) && map.addLayer(m)) : (map.hasLayer(m) && map.removeLayer(m));
    if (circleMap[p.id]) {
      const c = circleMap[p.id];
      show ? (!map.hasLayer(c) && map.addLayer(c)) : (map.hasLayer(c) && map.removeLayer(c));
    }
  });

  // Scenic drive polylines
  Object.entries(scenicPolylines).forEach(([id, poly]) => {
    const show = showAll || activeCategories.has('scenic-drive');
    show ? (!map.hasLayer(poly) && map.addLayer(poly)) : (map.hasLayer(poly) && map.removeLayer(poly));
  });

  // Close sheet if selected place no longer visible
  if (selectedPlaceId) {
    const sp = PLACES.find(x => x.id === selectedPlaceId);
    if (sp && !showAll && !activeCategories.has(sp.category)) closeSheet();
  }

  // Rebuild guide to reflect filter
  if (document.getElementById('guide-view').classList.contains('active')) buildGuide();
}

// ─────────────────────────────────────────
//  BOTTOM SHEET
// ─────────────────────────────────────────
function openSheet(id) {
  const p = PLACES.find(x => x.id === id);
  if (!p) return;
  selectedPlaceId = id;

  const cat = CATS[p.category];
  document.getElementById('sheet-dot').style.background = cat.color;
  document.getElementById('sheet-name').textContent = p.name;
  document.getElementById('sheet-meta').textContent =
    p.town + (p.distance ? ` · ${p.distance} km loop` : ` · ${cat.label}`);
  document.getElementById('sheet-desc').textContent = p.description;
  const rEl = document.getElementById('sheet-rating');
  let rHtml = p.rating
    ? `<div>${p.ratingLabel} rating: ${'★'.repeat(p.rating)}${'☆'.repeat(5 - p.rating)}</div>` : '';
  if (p.extraLinks && p.extraLinks.length) {
    rHtml += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;">' +
      p.extraLinks.map(el =>
        `<a href="${el.url}" target="_blank" rel="noopener" style="font-size:12px;color:#1a5e3b;text-decoration:none;font-weight:500;">${el.label} ↗</a>`
      ).join('') + '</div>';
  }
  rEl.innerHTML = rHtml;

  const actions = document.getElementById('sheet-actions');
  actions.innerHTML = '';

  const mapsBtn = document.createElement('a');
  mapsBtn.className = 'sheet-btn';
  mapsBtn.href = p.mapsUrl; mapsBtn.target = '_blank'; mapsBtn.rel = 'noopener';
  mapsBtn.textContent = '🗺 Maps';
  actions.appendChild(mapsBtn);

  if (p.routeUrl) {
    const routeBtn = document.createElement('a');
    routeBtn.className = 'sheet-btn';
    routeBtn.href = p.routeUrl; routeBtn.target = '_blank'; routeBtn.rel = 'noopener';
    routeBtn.textContent = '🚴 Route';
    actions.appendChild(routeBtn);
  }

  const guideBtn = document.createElement('button');
  guideBtn.className = 'sheet-btn';   // plain white — no green
  guideBtn.textContent = '📋 Guide';
  guideBtn.onclick = () => viewInGuide(id);
  actions.appendChild(guideBtn);

  // Highlight this drive's polyline; reset all others
  if (p.category === 'scenic-drive') highlightDrive(id);
  else resetDriveStyles();

  document.getElementById('bottom-sheet').classList.add('open');
}

function closeSheet() {
  selectedPlaceId = null;
  resetDriveStyles();
  document.getElementById('bottom-sheet').classList.remove('open');
}

function viewInGuide(id) {
  closeSheet();
  activeCategories.clear();   // show all categories in guide
  buildFilters();
  buildGuide();
  showTab('guide');
  setTimeout(() => {
    const el = document.getElementById('guide-entry-' + id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 1400);
    }
  }, 80);
}

// ─────────────────────────────────────────
//  GUIDE VIEW
// ─────────────────────────────────────────
function buildGuide() {
  const view = document.getElementById('guide-view');
  view.innerHTML = '';

  const showAll = activeCategories.size === 0;
  const catsToShow = Object.keys(CATS).filter(k => showAll || activeCategories.has(k));

  if (!catsToShow.length) {
    view.innerHTML = '<div class="guide-empty">No categories selected.</div>';
    return;
  }

  catsToShow.forEach(key => {
    const meta = CATS[key];
    const places = PLACES.filter(p => p.category === key);
    if (!places.length) return;

    const section = document.createElement('div');
    section.className = 'guide-section';

    const header = document.createElement('div');
    header.className = 'guide-section-header';
    header.innerHTML = `
      <div class="guide-section-swatch" style="background:${meta.color}"></div>
      <div class="guide-section-label">${meta.emoji} ${meta.label}</div>
      <div class="guide-section-count">${places.length}</div>`;
    section.appendChild(header);

    places.forEach(p => {
      const entry = document.createElement('div');
      entry.className = 'guide-entry';
      entry.id = 'guide-entry-' + p.id;

      let links = `<a class="guide-link" href="${p.mapsUrl}" target="_blank" rel="noopener">Google Maps ↗</a>`;
      if (p.routeUrl) links += `<a class="guide-link" href="${p.routeUrl}" target="_blank" rel="noopener">Route page ↗</a>`;
      if (p.extraLinks) p.extraLinks.forEach(el => {
        links += `<a class="guide-link" href="${el.url}" target="_blank" rel="noopener">${el.label} ↗</a>`;
      });

      const rHtml = p.rating
        ? `<div class="guide-entry-rating">${p.ratingLabel}: ${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>` : '';

      entry.innerHTML = `
        <div class="guide-entry-top">
          <div>
            <div class="guide-entry-name">${p.name}</div>
            <div class="guide-entry-town">${p.town}${p.distance ? ' · ' + p.distance + ' km' : ''}</div>
          </div>
          <button class="guide-map-btn" onclick="goToMap('${p.id}')">View on map →</button>
        </div>
        <div class="guide-entry-desc">${p.description}</div>
        ${rHtml}
        <div class="guide-entry-links">${links}</div>`;
      section.appendChild(entry);
    });

    view.appendChild(section);
  });

  // Static sections always shown
  const cycNote = document.createElement('div');
  cycNote.className = 'guide-static-section';
  cycNote.innerHTML = `
    <div class="guide-section-header" style="position:static">
      <div class="guide-section-swatch" style="background:#1D4ED8"></div>
      <div class="guide-section-label">🧭 Cycling Route Resources</div>
    </div>
    <div class="guide-static-body">
      Each official route page offers: <strong>Send to device with Ride with GPS</strong>,
      <strong>Download GPX file</strong> and <strong>Download PDF map</strong>. All loops are
      on Ride with GPS with distance, elevation and a Send to Device button for cycling computers.
      The Brome-Missisquoi tourism board also publishes a paper map featuring about ten circuits.
    </div>`;
  view.appendChild(cycNote);

  // (Experiences are now a full CATS category — rendered above with all other sections)
}

function goToMap(id) {
  const p = PLACES.find(x => x.id === id);
  if (!p) return;
  activeCategories.clear();
  applyFilters();
  showTab('map');
  map.panTo([p.lat, p.lng]);
  setTimeout(() => openSheet(id), 200);
}

// ─────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────
function showTab(tab) {
  document.getElementById('map-view').classList.toggle('active', tab === 'map');
  document.getElementById('guide-view').classList.toggle('active', tab === 'guide');
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('tab-guide').classList.toggle('active', tab === 'guide');
  if (tab === 'map') setTimeout(() => map.invalidateSize(), 50);
  if (tab === 'guide') buildGuide();
}

// ─────────────────────────────────────────
//  GPS LOCATION
// ─────────────────────────────────────────
function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    if (locationMarker) { map.removeLayer(locationMarker); map.removeLayer(locationCircle); }
    locationCircle = L.circle([lat, lng], {
      radius: accuracy, color: '#3b82f6', weight: 1,
      fillColor: '#3b82f6', fillOpacity: 0.1, interactive: false,
    }).addTo(map);
    locationMarker = L.circleMarker([lat, lng], {
      radius: 8, color: 'white', weight: 2, fillColor: '#3b82f6', fillOpacity: 1,
    }).addTo(map);
    map.setView([lat, lng], 12);
  }, err => alert('Could not get location: ' + err.message));
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
buildFilters();
buildGuide();
</script>
